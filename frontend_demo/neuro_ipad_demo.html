<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neuro-Sync | Counting Lesson 6-10</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Tốc độ nhún nhảy mặc định (nhanh) */
            --animal-bounce-speed: 0.6s;
        }

        body { 
            font-family: 'Fredoka', sans-serif;
            transition: background-color 1.5s ease; 
            touch-action: none; /* Ngăn trình duyệt zoom/scroll khi tap liên tục */
        }
        
        /* Hiệu ứng pop-in khi động vật xuất hiện */
        @keyframes popIn {
            0% { transform: translate(-50%, -50%) scale(0) rotate(-15deg); opacity: 0; }
            80% { transform: translate(-50%, -50%) scale(1.2) rotate(5deg); opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(1) rotate(0deg); opacity: 1; }
        }

        /* Hiệu ứng nhún nhảy (sẽ bị Agent làm chậm lại khi quá tải) */
        @keyframes animalBounce {
            0% { transform: translate(-50%, -50%) translateY(0) scale(1); }
            100% { transform: translate(-50%, -50%) translateY(-15px) scale(1.05); }
        }

        .spawned-animal {
            position: absolute;
            font-size: 5rem; /* Kích thước động vật */
            pointer-events: none; /* Để click xuyên qua nếu chúng đè lên nhau */
            user-select: none;
            filter: drop-shadow(0 10px 8px rgb(0 0 0 / 0.04)) drop-shadow(0 4px 3px rgb(0 0 0 / 0.1));
            z-index: 10;
            animation: 
                popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards,
                animalBounce var(--animal-bounce-speed) infinite alternate ease-in-out 0.4s;
        }

        /* Pulse animation for high tap rate (Đồng hồ đo tốc độ) */
        @keyframes dangerPulse {
            0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); }
            70% { box-shadow: 0 0 0 20px rgba(239, 68, 68, 0); }
            100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }
        .danger-state {
            animation: dangerPulse 1s infinite;
            border-color: #ef4444 !important;
            background-color: #fef2f2 !important;
        }
    </style>
</head>
<body id="app-shell" class="bg-gradient-to-b from-amber-50 to-orange-100 h-screen w-full flex flex-col items-center justify-center overflow-hidden relative cursor-pointer select-none">

    <div class="absolute top-[-10%] left-[-10%] w-72 h-72 bg-white/40 rounded-full blur-2xl pointer-events-none"></div>
    <div class="absolute bottom-[-10%] right-[-10%] w-96 h-96 bg-orange-200/30 rounded-full blur-3xl pointer-events-none"></div>

    <div id="agent-toast" class="absolute top-6 px-6 py-3 bg-amber-500 text-white font-bold text-base rounded-2xl opacity-0 transition-opacity duration-500 shadow-md border-2 border-white z-50 tracking-wide pointer-events-none">
        Agent monitoring...
    </div>

    <div class="absolute top-6 right-6 flex flex-col items-end z-50 pointer-events-none">
        <div id="speedometer" class="bg-white/80 backdrop-blur-md border-2 border-emerald-400 text-emerald-700 px-4 py-2 rounded-2xl shadow-sm transition-all duration-300 flex items-center space-x-2">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 15l-2 5L9 9l11 4-5 2zm0 0l5 5M7.188 2.239l.777 2.897M5.136 7.965l-2.898-.777M13.95 4.05l-2.122 2.122m-5.657 5.656l-2.12 2.122"></path></svg>
            <span class="font-bold text-lg"><span id="tap-rate">0</span> <span class="text-sm opacity-70">taps/s</span></span>
        </div>
        <div class="text-[10px] font-bold text-slate-400 mt-1 uppercase tracking-widest bg-white/50 px-2 py-0.5 rounded-full">Live Monitor</div>
    </div>

    <div class="text-center mb-6 relative z-10 px-4 pointer-events-none mt-20 md:mt-0">
        <h1 id="lesson-title" class="text-4xl md:text-5xl font-extrabold text-orange-600 mb-3 transition-colors duration-1000 tracking-wide drop-shadow-sm">
            Count the Animals!
        </h1>
        <p id="lesson-subtitle" class="text-amber-800/80 text-lg md:text-xl font-semibold bg-white/60 backdrop-blur-sm px-6 py-1.5 rounded-full inline-block shadow-sm transition-all duration-500">
            Tap ANYWHERE to spawn an animal
        </p>
    </div>

    <!-- Nơi chứa các con vật được sinh ra khi tap -->
    <div id="animal-container" class="absolute inset-0 pointer-events-none z-10 overflow-hidden"></div>

    <div class="absolute bottom-10 z-20 px-4 w-full text-center pointer-events-none">
        <div class="inline-flex items-center space-x-2 bg-slate-800/50 backdrop-blur-sm text-slate-200 px-4 py-2 rounded-full text-xs font-semibold">
            <span class="relative flex h-3 w-3">
              <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-amber-400 opacity-75"></span>
              <span class="relative inline-flex rounded-full h-3 w-3 bg-amber-500"></span>
            </span>
            <span>Agent Sentinel is analyzing your screen taps</span>
        </div>
    </div>

    <!-- Terminal hiển thị JSON ngầm -->
    <div class="absolute top-4 left-4 bg-amber-50 rounded-2xl p-4 w-80 max-w-[90vw] text-xs font-mono text-amber-900 shadow-lg hidden md:block border-4 border-amber-200/80 z-50 pointer-events-none transition-all duration-500" id="terminal-box">
        <div class="text-amber-700/80 border-b-2 border-dashed border-amber-200 pb-2 mb-2 font-bold tracking-wider uppercase text-[10px] flex items-center justify-between">
            <span>📋 Neuro-Sync Dashboard</span>
            <span class="bg-amber-200 text-amber-800 px-1.5 py-0.5 rounded text-[9px]">Telemetry</span>
        </div>
        <pre id="json-debugger" class="whitespace-pre-wrap break-words overflow-y-auto max-h-[40vh] font-sans text-amber-950 text-xs bg-white/50 p-2 rounded-xl border border-amber-100">{"status": "Listening for Real Taps..."}</pre>
    </div>

    <!-- Background Sound Tag -->
    <audio id="bg-audio" loop preload="none"></audio>

    <script>
        const appShell = document.getElementById('app-shell');
        const lessonTitle = document.getElementById('lesson-title');
        const lessonSubtitle = document.getElementById('lesson-subtitle');
        const toast = document.getElementById('agent-toast');
        const jsonDebugger = document.getElementById('json-debugger');
        const terminalBox = document.getElementById('terminal-box');
        const animalContainer = document.getElementById('animal-container');
        
        // Speedometer UI
        const speedometer = document.getElementById('speedometer');
        const tapRateDisplay = document.getElementById('tap-rate');

        // Danh sách các con vật để sinh ngẫu nhiên
        const animals = ['🐰', '🦊', '🐻', '🐼', '🐯', '🦁', '🐮', '🐷', '🐸', '🐵', '🐱', '🐶'];

        // --- REAL TELEMETRY LOGIC (Sliding Window Algorithm) ---
        let tapTimestamps = [];
        const OVERLOAD_THRESHOLD = 6; // Ngưỡng: 6 clicks/giây
        const TIME_WINDOW_MS = 1000;  // Cửa sổ thời gian: 1 giây
        let isAgentProcessing = false; // Khóa chống spam API
        
        // Audio Logic
        let isAudioPlaying = false;
        const bgAudio = document.getElementById('bg-audio');
        // Sử dụng nhạc game tươi vui, nhẹ nhàng miễn phí từ Pixabay
        const audioSrc = "https://cdn.pixabay.com/download/audio/2022/01/18/audio_d0a13f69d2.mp3?filename=calm-and-peaceful-115481.mp3"; 

        // Lắng nghe sự kiện click/tap trên toàn bộ body
        document.body.addEventListener('pointerdown', (e) => {
            // Tự động bật nhạc vào lần chạm đầu tiên (vượt qua chính sách chặn Autoplay của trình duyệt)
            if (!isAudioPlaying) {
                bgAudio.src = audioSrc;
                bgAudio.volume = 0.3; // Âm lượng 30% để không quá chói tai
                bgAudio.play().catch(err => console.warn("Audio blocked by browser:", err));
                isAudioPlaying = true;
            }

            // Hiệu ứng click visual feedback
            createClickRipple(e.clientX, e.clientY);
            
            if (isAgentProcessing) return; // Nếu đang chữa lỗi thì ngừng đếm & ngừng sinh để trẻ bình tĩnh

            // Sinh ra một con vật tại vị trí click
            spawnAnimal(e.clientX, e.clientY);

            const now = Date.now();
            tapTimestamps.push(now);
            
            // Xóa các mốc thời gian đã cũ hơn 1 giây
            tapTimestamps = tapTimestamps.filter(timestamp => now - timestamp <= TIME_WINDOW_MS);
            
            const currentTapsPerSecond = tapTimestamps.length;
            
            // Cập nhật giao diện đồng hồ đo tốc độ
            tapRateDisplay.innerText = currentTapsPerSecond;
            updateSpeedometerVisuals(currentTapsPerSecond);

            // Kiểm tra ngưỡng quá tải
            if (currentTapsPerSecond >= OVERLOAD_THRESHOLD) {
                triggerRealFrustration(currentTapsPerSecond);
            }
        });

        // Hàm liên tục làm sạch đồng hồ đo tốc độ khi người dùng ngừng click
        setInterval(() => {
            if (isAgentProcessing) return;
            const now = Date.now();
            tapTimestamps = tapTimestamps.filter(timestamp => now - timestamp <= TIME_WINDOW_MS);
            const currentTapsPerSecond = tapTimestamps.length;
            tapRateDisplay.innerText = currentTapsPerSecond;
            updateSpeedometerVisuals(currentTapsPerSecond);
        }, 300); // Check mỗi 300ms

        function spawnAnimal(x, y) {
            const animalEl = document.createElement('div');
            animalEl.className = 'spawned-animal';
            animalEl.innerText = animals[Math.floor(Math.random() * animals.length)];
            
            // Thêm chút ngẫu nhiên về góc nghiêng ban đầu
            const randomRotation = (Math.random() - 0.5) * 30; // -15 to 15 degrees
            
            animalEl.style.left = `${x}px`;
            animalEl.style.top = `${y}px`;
            
            animalContainer.appendChild(animalEl);

            // Dọn dẹp DOM: Giới hạn tối đa 30 con vật trên màn hình để tránh giật lag
            if (animalContainer.children.length > 30) {
                animalContainer.firstChild.remove();
            }
        }

        function updateSpeedometerVisuals(taps) {
            if (taps >= OVERLOAD_THRESHOLD) {
                speedometer.className = "bg-rose-100/90 backdrop-blur-md border-2 border-rose-500 text-rose-700 px-4 py-2 rounded-2xl shadow-md transition-all duration-300 flex items-center space-x-2 danger-state";
            } else if (taps >= OVERLOAD_THRESHOLD / 2) {
                speedometer.className = "bg-amber-100/90 backdrop-blur-md border-2 border-amber-400 text-amber-700 px-4 py-2 rounded-2xl shadow-sm transition-all duration-300 flex items-center space-x-2";
            } else {
                speedometer.className = "bg-white/80 backdrop-blur-md border-2 border-emerald-400 text-emerald-700 px-4 py-2 rounded-2xl shadow-sm transition-all duration-300 flex items-center space-x-2";
            }
        }

        function createClickRipple(x, y) {
            const ripple = document.createElement('div');
            ripple.className = 'absolute rounded-full border-4 border-orange-400/50 pointer-events-none animate-ping z-0';
            ripple.style.left = `${x - 20}px`;
            ripple.style.top = `${y - 20}px`;
            ripple.style.width = '40px';
            ripple.style.height = '40px';
            document.body.appendChild(ripple);
            setTimeout(() => ripple.remove(), 1000);
        }

        function showToast(msg) {
            toast.innerText = msg;
            toast.classList.remove('opacity-0');
            setTimeout(() => toast.classList.add('opacity-0'), 4000);
        }

        async function triggerRealFrustration(tapRate) {
            isAgentProcessing = true; // Khóa hệ thống, ngừng ghi nhận click
            tapTimestamps = []; // Xóa bộ đệm
            
            showToast(`🚨 Overload Detected: ${tapRate} taps/s! Calling MAS Agent...`);
            jsonDebugger.innerText = "POST /api/v1/telemetry/overload\nWaiting for AI Diagnostician...";

            // Đổi màu Terminal sang trạng thái khẩn cấp
            terminalBox.classList.replace('bg-amber-50', 'bg-rose-50');
            terminalBox.classList.replace('border-amber-200/80', 'border-rose-300');

            try {
                let host = window.location.origin;
                if (window.location.port === "5500" || window.location.origin.includes('file://')) {
                    host = "http://127.0.0.1:8000";
                }
                const endpoint = `${host}/api/v1/telemetry/overload`;

                const response = await fetch(endpoint, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        student_id: "Min_01",
                        anomaly_type: "rapid_tapping_detected",
                        taps_per_second: tapRate
                    })
                });

                if (response.ok) {
                    const data = await response.json();
                    
                    // Phục hồi màu Terminal và hiện JSON
                    terminalBox.classList.replace('bg-rose-50', 'bg-slate-900');
                    terminalBox.classList.replace('border-rose-300', 'border-slate-700');
                    jsonDebugger.className = "whitespace-pre-wrap break-words overflow-y-auto max-h-[40vh] font-mono text-green-400 text-xs bg-black/50 p-3 rounded-xl";
                    jsonDebugger.innerText = JSON.stringify(data.intervention, null, 2);
                    
                    // Áp dụng trạng thái làm dịu
                    applyUiState(data.intervention.ui_state);
                    showToast("🤖 MAS Agent: Cognitive Load Balancing Deployed");
                } else {
                    showToast("❌ MAS System Processing Error");
                    jsonDebugger.innerText = `Error: HTTP ${response.status}`;
                    isAgentProcessing = false; 
                }
            } catch (error) {
                console.error("Error:", error);
                showToast("❌ Network Error: Cannot connect to Backend.");
                jsonDebugger.innerText = "Error: Connection Refused. Please check if main.py is running on port 8000.";
                isAgentProcessing = false; 
            }
        }

        function applyUiState(uiConfig) {
            if (!uiConfig) return;

            // 1. Đổi màu nền dịu
            if (uiConfig.theme_color) {
                appShell.style.backgroundColor = uiConfig.theme_color;
                appShell.classList.remove('from-amber-50', 'to-orange-100', 'bg-gradient-to-b');
                lessonTitle.style.color = "#0f172a";
            }

            // 2. Làm chậm mọi chuyển động của các con vật hiện tại thay vì xóa chúng
            if (uiConfig.lottie_speed_multiplier !== undefined) {
                let speedSeconds = "0.6s"; // Nhanh mặc định
                if (uiConfig.lottie_speed_multiplier <= 0.5) {
                    speedSeconds = "2.5s"; // Chậm rãi (Calm)
                }
                // Thay đổi biến CSS toàn cục để ảnh hưởng toàn bộ animation
                document.documentElement.style.setProperty('--animal-bounce-speed', speedSeconds);
            }

            // 3. Giảm độ phức tạp (Visual Complexity)
            if (uiConfig.visual_complexity === "low") {
                lessonTitle.innerText = "Let's count slowly...";
                lessonTitle.classList.remove("text-4xl", "text-orange-600");
                lessonTitle.classList.add("text-2xl", "text-slate-800");
                
                lessonSubtitle.innerText = "Take a deep breath. You're safe here.";
                lessonSubtitle.classList.replace('text-amber-800/80', 'text-slate-600');
                
                // Đã loại bỏ logic xóa động vật ở đây để giữ lại các con vật trên màn hình theo yêu cầu.
            }

            // 4. Quản lý âm thanh
            if (uiConfig.audio_enabled === false) {
                bgAudio.pause();
                showToast("🔇 Overstimulating audio disabled.");
            }
        }
    </script>
</body>
</html>
